<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anurag Dwivedi VIP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000428,#004e92);
color:#fff;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,255,255,0.3);
width:330px;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #00ffe1;
margin-bottom:15px;
object-fit:cover;
}

h1{font-size:26px;margin-bottom:5px;}
.subs{opacity:0.7;margin-bottom:10px;}
.desc{font-size:14px;opacity:0.85;margin-bottom:15px;}

.timer{
color:#00ffe1;
font-weight:bold;
margin:15px 0;
font-size:16px;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:30px;
background:linear-gradient(45deg,#00ffe1,#00aaff);
color:#000;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

.small{
margin-top:12px;
font-size:12px;
opacity:0.6;
}
</style>

</head>

<body>

<div class="card">

<img src="myphoto.jpg" class="profile">

<h1>Anurag Dwivedi VIP</h1>
<div class="subs">Premium Telegram Channel</div>

<div class="desc">Daily Winning Tips • VIP Updates • High Accuracy 🔥</div>

<div class="timer" id="countdown">Redirecting in 10s</div>

<a href="https://t.me/+KWeyY97xX_1mN2U1" class="btn">
🚀 Join Channel
</a>

<div class="small">Instant access • No waiting ⚡</div>

</div>

<script>
let time = 10;
let timer = document.getElementById("countdown");

let interval = setInterval(() => {
time--;
timer.innerHTML = "Redirecting in " + time + "s";

if(time <= 0){
clearInterval(interval);
window.location.href = "https://t.me/+KWeyY97xX_1mN2U1";
}
},1000);
</script>

</body>
</html>
